<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
      padding: 32px;
      height: fit-content;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 24px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #4f46e5;
    }

    .input-row button {
      padding: 12px 20px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #4338ca;
    }

    .stats {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 16px;
    }

    .list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: #f8fafc;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
      transition: opacity 0.2s;
    }

    .item.checked {
      opacity: 0.5;
    }

    .item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 15px;
      color: #1e293b;
      transition: text-decoration 0.2s;
    }

    .item.checked .item-text {
      text-decoration: line-through;
      color: #94a3b8;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #cbd5e1;
      font-size: 18px;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      line-height: 1;
      transition: color 0.2s, background 0.2s;
    }

    .delete-btn:hover {
      color: #ef4444;
      background: #fee2e2;
    }

    .empty {
      text-align: center;
      color: #94a3b8;
      font-size: 15px;
      padding: 40px 0;
    }

    .clear-btn {
      width: 100%;
      margin-top: 20px;
      padding: 10px;
      background: none;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      color: #94a3b8;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .clear-btn:hover {
      border-color: #ef4444;
      color: #ef4444;
      background: #fff5f5;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛒 쇼핑 리스트</h1>

    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템 추가..." />
      <button onclick="addItem()">추가</button>
    </div>

    <div class="stats" id="stats"></div>
    <ul class="list" id="list"></ul>
    <button class="clear-btn" id="clearBtn" onclick="clearChecked()" style="display:none">완료 항목 삭제</button>
  </div>

  <script>
    let items = JSON.parse(localStorage.getItem('shopping') || '[]');

    function save() {
      localStorage.setItem('shopping', JSON.stringify(items));
    }

    function render() {
      const list = document.getElementById('list');
      const stats = document.getElementById('stats');
      const clearBtn = document.getElementById('clearBtn');

      const total = items.length;
      const checked = items.filter(i => i.done).length;

      stats.textContent = total === 0 ? '' : `${total}개 중 ${checked}개 완료`;
      clearBtn.style.display = checked > 0 ? 'block' : 'none';

      if (total === 0) {
        list.innerHTML = '<li class="empty">리스트가 비어 있어요</li>';
        return;
      }

      list.innerHTML = items.map((item, idx) => `
        <li class="item ${item.done ? 'checked' : ''}">
          <input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggle(${idx})">
          <span class="item-text">${escapeHtml(item.text)}</span>
          <button class="delete-btn" onclick="remove(${idx})" title="삭제">✕</button>
        </li>
      `).join('');
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function addItem() {
      const input = document.getElementById('itemInput');
      const text = input.value.trim();
      if (!text) return;
      items.push({ text, done: false });
      save();
      render();
      input.value = '';
      input.focus();
    }

    function toggle(idx) {
      items[idx].done = !items[idx].done;
      save();
      render();
    }

    function remove(idx) {
      items.splice(idx, 1);
      save();
      render();
    }

    function clearChecked() {
      items = items.filter(i => !i.done);
      save();
      render();
    }

    document.getElementById('itemInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    render();
  </script>
</body>
</html>
